<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Bootstrap/css/bootstrap.min.css">
    <title>Document</title>
</head>
<body class="container">
    <div class="row mb-5 text-center mt-5">
        <label class="fs-1">Formulario de datos</label>
    </div>
    <div class="row">
        <div class="offset-3 col-6">
            <div class="md-3">
                <label for="field-name" class="form-label">Nombre(s):</label>
                <input id="field-name" type="text" class="form-control">
            </div>
            <div class="md-3">
                <label for="field-last-name" class="form-label">Apellidos:</label>
                <input id="field-last-name" type="text" class="form-control">
            </div>
            <div class="md-3">
                <label for="field-telefono" class="form-label">Teléfono</label>
                <input id="field-telefono" type="text" class="form-control">
            </div>
            <div class="md-3">
                <label for="field-e-mail" class="form-label">Correo Electrónico</label>
                <input id="field-e-mail" type="text" class="form-control">
            </div>
            <div class="md-3">
                <label for="field-domicilio" class="form-label">Domicilio</label>
                <input id="field-domicilio" type="text" class="form-control">
            </div>
            <div class="md-3 mt-3 dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    Dropdown button
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Action</a></li>
                    <li><a class="dropdown-item" href="#">Another action</a></li>
                    <li><a class="dropdown-item" href="#">Something else here</a></li>
                </ul>
            </div>
            <button id="btn-action-form" class="btn btn-primary mt-3">Crear y acceder</button>
        </div>
    </div>
    <script src="Bootstrap/js/bootstrap.min.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
